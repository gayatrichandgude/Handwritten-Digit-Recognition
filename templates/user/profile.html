
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.profile-card{
    width:450px;
    background:white;
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #2563eb;
    margin-bottom:15px;
}

.profile-card h2{
    color:#2563eb;
    margin-bottom:8px;
}

.tagline{
    color:#64748b;
    margin-bottom:25px;
}

.input-box{
    display:flex;
    align-items:center;
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:14px;
    margin-bottom:15px;
}

.input-box i{
    color:#2563eb;
    margin-right:12px;
}

.input-box input{
    width:100%;
    border:none;
    background:none;
    outline:none;
    font-size:15px;
}

button{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.3s;
}

button[type="submit"]{
    background:#2563eb;
    color:white;
}

button[type="submit"]:hover{
    background:#1d4ed8;
}

.danger-btn{
    background:#ef4444;
    color:white;
}

.danger-btn:hover{
    background:#dc2626;
}

hr{
    margin:25px 0;
    border:none;
    height:1px;
    background:#e2e8f0;
}

.back-btn{
    position:fixed;
    top:25px;
    left:25px;
    width:50px;
    height:50px;
    border-radius:50%;
    background:white;
    color:#2563eb;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.back-btn:hover{
    transform:scale(1.08);
}

</style>
</head>

<body>

<a href="/dashboard" class="back-btn">
    <i class="fas fa-arrow-left"></i>
</a>

<div class="profile-card">

    <img
    src="{% if user.profile_pic %}
        {{ url_for('static', filename='profile_pics/' + user.profile_pic) }}
    {% else %}
        {{ url_for('static', filename='profile_pics/default.png') }}
    {% endif %}"
    class="profile-img">

    <h2>
        <i class="fa-solid fa-user-circle"></i>
        My Profile
    </h2>

    <p class="tagline">Manage your account ⚙️</p>

    <div class="input-box">
        <i class="fa fa-user"></i>
        <input type="text" value="{{ user.name }}" disabled>
    </div>

    <hr>

    <form id="changePwdForm">

        <div class="input-box">
            <i class="fa fa-lock"></i>
            <input type="password"
                   name="old_password"
                   placeholder="Current Password"
                   required>
        </div>

        <div class="input-box">
            <i class="fa fa-lock"></i>
            <input type="password"
                   name="new_password"
                   placeholder="New Password"
                   required>
        </div>

        <div class="input-box">
            <i class="fa fa-lock"></i>
            <input type="password"
                   name="confirm_password"
                   placeholder="Confirm Password"
                   required>
        </div>

        <button type="submit">
            Change Password
        </button>

    </form>

    <hr>

    <button id="deleteAccountBtn"
            class="danger-btn">
        Delete My Account
    </button>

</div>

<script>

document.getElementById("deleteAccountBtn")
.addEventListener("click", async function(){

    const password =
    prompt("Enter your password to confirm account deletion:");

    if(!password) return;

    try{

        const res = await fetch("/delete_account",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                password:password
            })
        });

        const data = await res.json();

        if(data.success){
            alert(data.message);
            window.location.href="/login_page";
        }else{
            alert(data.error);
        }

    }catch(err){
        alert("Something went wrong.");
    }

});

</script>

</body>
</html>
