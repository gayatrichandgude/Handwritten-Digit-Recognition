<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
    

    <style>
       body{
    margin:0;
    padding:20px;
    font-family:'Poppins',sans-serif;
    background:#f8fafc;
    color:#1e293b;
}

/* =========================
   NAVBAR
========================= */

.navbar{
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 35px;
    border-radius:20px;
    box-shadow:0 5px 25px rgba(0,0,0,0.08);
    margin-bottom:80px;
}

.navbar-title{
    font-size:32px;
    font-weight:700;
    background:linear-gradient(135deg,#2563eb,#8b5cf6,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.back-icon{
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:white;
    color:#2563eb;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.back-icon:hover{
    transform:translateY(-3px);
}

/* =========================
   CARDS
========================= */

.cards-container{
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    position:relative;
    overflow:hidden;
    padding:30px;
    border-radius:25px;
    text-align:center;
    color:white;
    min-height:120px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.12);

    transition:0.4s ease;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
}

.card h4{
    font-size:22px;
    margin-bottom:15px;
}

.card h3{
    font-size:22px;
    margin:0;
}

/* Card Colors */

.card:nth-child(1){
    background:linear-gradient(135deg,#3b82f6,#60a5fa);
}

.card:nth-child(2){
    background:linear-gradient(135deg,#8b5cf6,#a78bfa);
}

.card:nth-child(3){
    background:linear-gradient(135deg,#10b981,#34d399);
}

.card:nth-child(4){
    background:linear-gradient(135deg,#f59e0b,#fbbf24);
}
.card:nth-child(5){
    background:linear-gradient(135deg,#ec4899,#f472b6);
}

/* Shine Effect */

.card::before{
    content:"";
    position:absolute;
    top:-100%;
    left:-100%;
    width:200%;
    height:200%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
    );
    transform:rotate(25deg);
    transition:0.8s;
}

.card:hover::before{
    top:100%;
    left:100%;
}

/* =========================
   BREAKDOWN CARD
========================= */

.sub-card{
    width:320px;
    margin:40px auto 0 auto;
    padding:25px;
    border-radius:20px;

    background:linear-gradient(135deg,#ec4899,#f472b6);
    color:white;
    text-align:center;

   box-shadow:
    0 10px 30px rgba(0,0,0,0.12);

    transition:0.4s ease;
}



.sub-card h3{
    margin-bottom:20px;
    font-size:22px;
}

.sub-card p{
    margin:12px 0;
    font-size:18px;
    color:white;
}

/* =========================
   DOWNLOAD BUTTON
========================= */

.download-section{
    text-align:center;
    margin-top:40px;
}

.export-btn{
    padding:14px 28px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.export-btn:hover{
    transform:translateY(-3px);
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1100px){

    .cards-container{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:700px){

    .cards-container{
        grid-template-columns:1fr;
    }

    .navbar{
        flex-direction:column;
        gap:15px;
    }

    .navbar-title{
        font-size:24px;
    }

}
    </style>
</head>

<body>

<!-- 🔹 NAVBAR -->
<div class="navbar">
    <div class="navbar-left"></div>
    <div class="navbar-title">📄 Prediction Reports</div>
    <div class="navbar-right">
         <a href="/dashboard" class="back-icon">←</a>
    </div>
</div>



<div class="cards-container">

    <div class="card">
        <h3>Total Predictions</h3>
        <p>{{ total }}</p>
    </div>

    <div class="card">
        <h3>Top Digit</h3>
        <p>{{ top_digit }}</p>
    </div>

    <div class="card">
        <h3>Accuracy</h3>
        <p>{{ accuracy }}%</p>
    </div>

    <div class="card">
        <h3>Average Confidence</h3>
        <p>{{ avg_confidence }}%</p>
    </div>

    </div> <!-- cards-container close -->

<div class="sub-card">
    <h3>Prediction Type Breakdown</h3>

    <p>✍ Draw : {{ draw_count }}</p>
    <p>🖼 Image : {{ image_count }}</p>
    <p>🎤 Voice : {{ voice_count }}</p>
</div>

</div>

<div class="download-section">
    <button class="export-btn">
        📄 Download PDF Report
    </button>
</div>

</body>
</html>
