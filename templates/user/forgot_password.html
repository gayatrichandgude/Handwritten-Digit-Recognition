<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

<form action="/reset_password" method="post" class="form-box">

    <h2>🔐 Forgot Password</h2>
    <p class="tagline">Enter your email to reset password</p>

    <div class="input-box">
        <input type="email" name="email" placeholder="Enter Email" required>
    </div>

    <button type="submit">Reset Password</button>

    <p class="link-text">
        <a href="/login_page">⬅ Back to Login</a>
    </p>

</form>

</div>

</body>
</html>
