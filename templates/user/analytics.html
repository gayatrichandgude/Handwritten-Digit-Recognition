<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#f8fafc;
    color:#1e293b;
}

/* =========================
   NAVBAR
========================= */

.navbar{
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 35px;
    border-radius:20px;
    box-shadow:0 5px 25px rgba(0,0,0,0.08);
    margin:20px;
}

.navbar-title{
    font-size:28px;
    font-weight:700;
    background:linear-gradient(135deg,#2563eb,#8b5cf6,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.back-icon{
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:white;
    color:#2563eb;
    text-decoration:none;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.back-icon:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 10px 20px rgba(37,99,235,0.25);
}

/* =========================
   FILTERS
========================= */

.filters{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:30px 20px;
    flex-wrap:wrap;
}

.filters select,
.filters input[type="date"]{
    padding:12px;
    border-radius:12px;
    border:1px solid #e2e8f0;
    background:white;
    font-size:14px;
}

.filters button{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

/* =========================
   STAT CARDS
========================= */

.cards{
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    position:relative;
    overflow:hidden;
    padding:25px;
    border-radius:25px;
    text-align:center;
    color:white;

    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.3);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.15),
    0 0 30px rgba(255,255,255,0.15);

    transition:0.4s ease;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

/* Multi Color Cards */

.card:nth-child(1){
    background:linear-gradient(135deg,#3b82f6,#60a5fa);
}

.card:nth-child(2){
    background:linear-gradient(135deg,#10b981,#34d399);
}

.card:nth-child(3){
    background:linear-gradient(135deg,#8b5cf6,#a78bfa);
}

.card:nth-child(4){
    background:linear-gradient(135deg,#ef4444,#f87171);
}

.card h4{
    color:white;
    opacity:.9;
    margin-bottom:10px;
}

.card h3{
    font-size:28px;
    margin:0;
}

.card::before{
    content:"";
    position:absolute;
    top:-100%;
    left:-100%;
    width:200%;
    height:200%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
    );
    transform:rotate(25deg);
    transition:0.8s;
}

.card:hover::before{
    top:100%;
    left:100%;
}

/* =========================
   CHARTS
========================= */

.charts{
    max-width:1000px;
    margin:39px auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
}

.chart-box{
    background:white;
    padding:10px;
    border-radius:19px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    height:400px;
}

.chart-box canvas{
    width:100% !important;
    height:300px !important;
}

/* =========================
   EXPORT BUTTON
========================= */

.export-btn{
    display:block;
    margin:40px auto;
    border:none;
    background:linear-gradient(135deg,#2563eb,#8b5cf6);
    color:white;
    padding:14px 25px;
    border-radius:15px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(37,99,235,.25);
}

.export-btn:hover{
    transform:translateY(-3px);
}



/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    .cards{
        grid-template-columns:repeat(2,1fr);
    }

    .charts{
        grid-template-columns:1fr;
    }
}

@media(max-width:600px){

    .cards{
        grid-template-columns:1fr;
    }
}
    </style>
</head>

<body>

<!-- 🔷 NAVBAR -->
<div class="navbar">
    <div class="navbar-left"></div>
    <div class="navbar-title">📊 Analytics Dashboard</div>
    <div class="navbar-right">
        <a href="/dashboard" class="back-icon">
    ←
</a>
    </div>
</div>

<!-- 🔷 FILTER SECTION -->
<div class="filters">
    <select id="filterType">
        <option value="all">All Types</option>
        <option value="draw">Draw</option>
        <option value="image">Image</option>
        <option value="voice">Voice</option>
    </select>

    <input type="date" id="startDate" placeholder="Start Date">
    <input type="date" id="endDate" placeholder="End Date">

    <button onclick="applyFilters()">Apply Filter</button>
</div>

<!-- 🔹 CARDS -->
<div class="cards">
    <div class="card">
        <h4>Total Predictions</h4>
        <h3>{{ total }}</h3>
    </div>

    <div class="card">
        <h4>Most Predicted</h4>
        <h3>{{ most_digit }}</h3>
    </div>

    <div class="card">
        <h4>Accuracy</h4>
        <h3>{{ accuracy }}%</h3>
    </div>
</div>

<!-- 🔹 CHARTS -->
<div class="charts">
    <div>
        <h4 style="text-align:center;">Digit Frequency</h4>
        <canvas id="barChart" width="300" height="300"></canvas>
    </div>

    <div>
        <h4 style="text-align:center;">Prediction Distribution</h4>
        <canvas id="pieChart" width="300" height="300"></canvas>
    </div>
</div>

<!-- 🔹 EXPORT BUTTON -->
<button class="export-btn" onclick="exportCharts()">Export Charts PNG</button>



<script>
// DATA from backend
let digits = {{ digits | tojson }};
let counts = {{ counts | tojson }};

// 🔹 BAR CHART
let barChart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: digits,
        datasets: [{
            label: 'Predictions',
            data: counts,
            backgroundColor: '#22c55e'
        }]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{display:false}
        },
        scales:{
            y:{beginAtZero:true}
        }
    }
});

// 🔹 PIE CHART
let pieChart = new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: digits,
        datasets: [{
            data: counts,
            backgroundColor: [
                '#22c55e','#3b82f6','#f59e0b','#ef4444','#a855f7',
                '#14b8a6','#f43f5e','#eab308','#6366f1','#10b981'
            ]
        }]
    },
    options:{responsive:true}
});

// 🔹 FILTER FUNCTION - Reload page with filters applied
function applyFilters(){
    let type = document.getElementById("filterType").value;
    let start = document.getElementById("startDate").value;
    let end = document.getElementById("endDate").value;

    // Build query string
    let params = new URLSearchParams();
    if (type !== 'all') params.append('type', type);
    if (start) params.append('start', start);
    if (end) params.append('end', end);
    
    // Reload page with parameters (optional - or you can use AJAX)
    if (params.toString()) {
        window.location.href = '/analytics?' + params.toString();
    }
}

// 🔹 EXPORT CHARTS FUNCTION
function exportCharts(){
    // Export bar chart
    let barLink = document.createElement('a');
    barLink.href = barChart.toBase64Image();
    barLink.download = 'bar_chart.png';
    barLink.click();

    // Export pie chart
    let pieLink = document.createElement('a');
    pieLink.href = pieChart.toBase64Image();
    pieLink.download = 'pie_chart.png';
    pieLink.click();
}
</script>

</body>
</html>
