<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <title>{% block title %}Admin{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/admin_dashboard.css') }}">
    
    <style>
        /* 🔷 GLOBAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
    font-family:'Poppins',sans-serif;
    background:#f4f7fc;
    color:#1e293b;
}

        /* 🔷 SIDEBAR */
       .sidebar{
    width:260px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:#ffffff;
    border-right:1px solid #e2e8f0;
    padding:25px;
    box-shadow:0 0 25px rgba(0,0,0,.05);
}

.sidebar h2{
    text-align:center;
    color:#2563eb;
    margin-bottom:40px;
    font-size:24px;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 18px;
    margin-bottom:12px;
    text-decoration:none;
    color:#475569;
    border-radius:14px;
    font-weight:500;
    transition:.3s;
}

.sidebar a:hover{
    background:#eff6ff;
    color:#2563eb;
}

.sidebar a.active{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    box-shadow:0 10px 20px rgba(37,99,235,.25);
}

.hero{
    background:linear-gradient(135deg,#4f46e5,#2563eb);
    color:white;
    padding:35px;
    border-radius:25px;
    margin-bottom:30px;
    box-shadow:0 15px 35px rgba(79,70,229,.25);
}

.hero h1{
    font-size:34px;
    margin-bottom:10px;
}

.hero p{
    opacity:.9;
}
        /* 🔷 MAIN CONTENT */
        .main{
    margin-left:260px;
    padding:30px;
}

        .main h1 {
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 600;
        }

        .main h2 {
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: 600;
        }

        /* 🔷 CARDS */
        .cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:22px;
    margin-bottom:30px;
}

.card{
    border-radius:22px;
    padding:25px;
    color:white;
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);
}

.card:nth-child(1){
    background:linear-gradient(135deg,#3b82f6,#2563eb);
}

.card:nth-child(2){
    background:linear-gradient(135deg,#8b5cf6,#6d28d9);
}

.card:nth-child(3){
    background:linear-gradient(135deg,#22c55e,#16a34a);
}

.card:nth-child(4){
    background:linear-gradient(135deg,#f97316,#ea580c);
}

.card h3{
    font-size:15px;
    opacity:.9;
}

.card h2{
    font-size:38px;
    margin-top:10px;
}

        /* 🔷 CHARTS */
        .charts{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.chart-box{
    background:white;
    padding:25px;
    border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.07);
}

.chart-box h3{
    margin-bottom:15px;
    color:#1e293b;
}

        /* 🔷 TABLE */
        .table-container {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        th {
            background: #0f172a;
            font-weight: 600;
            color: #94a3b8;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tr:nth-child(even) {
            background: #1e293b;
        }

        tr:hover {
            background: #334155;
        }

        /* 🔷 SEARCH BOX */
        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            padding: 10px 15px;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        /* 🔷 BUTTONS */
        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            margin-right: 5px;
            display: inline-block;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-view {
            background: #3b82f6;
            color: white;
        }

        .btn-view:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-download {
            background: #22c55e;
            color: white;
        }

        .btn-download:hover {
            background: #16a34a;
            transform: translateY(-2px);
        }

        /* 🔷 FORM */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #cbd5f5;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        /* 🔷 IMAGE THUMBNAIL */
        img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            transition: all 0.3s ease;
            object-fit: cover;
        }

        img:hover {
            transform: scale(1.5);
            z-index: 11;
        }

        /* 🔷 RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }

            .sidebar a {
                padding: 12px 5px;
                text-align: center;
                font-size: 12px;
            }

            .main {
                margin-left: 70px;
                padding: 15px;
            }

            .charts {
                flex-direction: column;
            }

            .chart-box {
                width: 100%;
            }

            .cards {
                flex-direction: column;
            }

            .card {
                min-width: auto;
            }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>

<body style="background: var(--bg-gradient); color: var(--text);">



<!-- 🔷 SIDEBAR -->
<div class="sidebar" style="background: var(--bg-gradient);">
    <h2>🛠 Admin</h2>

    <a href="{{ url_for('admin_dashboard') }}" class="{% block nav_dashboard %}{% endblock %}">📊 Dashboard</a>
    <a href="{{ url_for('admin_users') }}" class="{% block nav_users %}{% endblock %}">👥 Users</a>
    <a href="{{ url_for('admin_predictions') }}" class="{% block nav_predictions %}{% endblock %}">📜 Predictions</a>
    <a href="{{ url_for('admin_analytics') }}" class="{% block nav_analytics %}{% endblock %}">📈 Analytics</a>
    <a href="{{ url_for('admin_reports_list') }}" class="{% block nav_reports %}{% endblock %}">📂 Reports</a>
    <a href="{{ url_for('admin_settings') }}" class="{% block nav_settings %}{% endblock %}">⚙ Settings</a>
    <a href="{{ url_for('admin_logout') }}">🚪 Logout</a>
</div>

<!-- 🔷 MAIN CONTENT -->
<div class="main">
    {% block content %}{% endblock %}
</div>

{% block scripts %}{% endblock %}

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</body>
</html>

{% block styles %}
<style>
.cards-container{
    display: grid !important;
    grid-template-columns: repeat(4, 1fr) !important;
    gap: 20px;
    margin-bottom: 40px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.1);
}
</style>
{% endblock %}
